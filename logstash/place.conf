input {
  jdbc {
    jdbc_driver_library    => "/usr/share/logstash/drivers/mysql-connector-j.jar"
    jdbc_driver_class      => "com.mysql.cj.jdbc.Driver"
    jdbc_connection_string => "jdbc:mysql://${DB_HOST}:3306/puppynote?useSSL=false&serverTimezone=Asia/Seoul"
    jdbc_user              => "${DB_USERNAME}"
    jdbc_password          => "${DB_PASSWORD}"
    use_column_value       => true
    tracking_column        => "updated_date"
    tracking_column_type   => "timestamp"
    last_run_metadata_path => "/usr/share/logstash/data/.last_run_places"
    schedule               => "*/30 * * * * *"
    statement              => "
      SELECT
        p.id              AS place_id,
        p.title,
        p.content,
        p.latitude,
        p.longitude,
        p.category,
        p.large_dog_available,
        p.parking_available,
        p.off_leash_available,
        p.like_count,
        p.admin_yn,
        p.deleted_at,
        p.created_date,
        p.updated_date
      FROM places p
      WHERE p.updated_date > :sql_last_value
      ORDER BY p.updated_date ASC
    "
  }
}

filter {
  mutate {
    rename => {
      "place_id"            => "placeId"
      "large_dog_available" => "largeDogAvailable"
      "parking_available"   => "parkingAvailable"
      "off_leash_available" => "offLeashAvailable"
      "like_count"          => "likeCount"
      "admin_yn"            => "adminYn"
      "created_date"        => "createdDate"
      "updated_date"        => "updatedDate"
      "deleted_at"          => "deletedAt"
    }
  }

  # latitude/longitude를 ES geo_point 형태로 변환
  ruby {
    code => "
      lat = event.get('latitude')
      lon = event.get('longitude')
      if lat && lon
        event.set('location', { 'lat' => lat.to_f, 'lon' => lon.to_f })
      end
      event.remove('latitude')
      event.remove('longitude')
    "
  }

  ruby {
    code => "
      ['createdDate', 'updatedDate', 'deletedAt'].each do |field|
        val = event.get(field)
        if val
          event.set(field, val.to_s[0, 19])
        end
      end
    "
  }

  mutate {
    add_field    => { "[@metadata][doc_id]" => "%{placeId}" }
    remove_field => ["@version", "@timestamp"]
  }
}

output {
  # deletedAt 있거나 adminYn = 'N' (미승인)이면 ES에서 삭제
  if ([deletedAt] and [deletedAt] != "") or [adminYn] == "N" {
    elasticsearch {
      hosts       => ["http://${ES_HOST}:9200"]
      user        => "${ES_USERNAME}"
      password    => "${ES_PASSWORD}"
      index       => "places"
      action      => "delete"
      document_id => "%{[@metadata][doc_id]}"
    }
  } else {
    elasticsearch {
      hosts         => ["http://${ES_HOST}:9200"]
      user          => "${ES_USERNAME}"
      password      => "${ES_PASSWORD}"
      index         => "places"
      action        => "update"
      document_id   => "%{[@metadata][doc_id]}"
      doc_as_upsert => true
    }
  }
}
