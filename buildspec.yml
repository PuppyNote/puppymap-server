version: 0.2

env:
  parameter-store:
    # 빌드 타임 환경변수 (build.gradle processResources가 yml에 주입)
    DB_HOST:               "/puppymap/prd/DB_HOST"
    DB_USERNAME:           "/puppymap/prd/DB_USERNAME"
    DB_PASSWORD:           "/puppymap/prd/DB_PASSWORD"
    JWT_SECRET_KEY:        "/puppymap/prd/JWT_SECRET_KEY"
    EMAIL_PASSWORD:        "/puppymap/prd/EMAIL_PASSWORD"
    AWS_ACCESS_KEY:        "/puppymap/prd/AWS_ACCESS_KEY"
    AWS_SECRET_KEY:        "/puppymap/prd/AWS_SECRET_KEY"
    ES_HOST:               "/puppymap/prd/ES_HOST"
    ES_USERNAME:           "/puppymap/prd/ES_USERNAME"
    ES_PASSWORD:           "/puppymap/prd/ES_PASSWORD"
    REDIS_HOST:            "/puppymap/prd/REDIS_HOST"
    REDIS_PASSWORD:        "/puppymap/prd/REDIS_PASSWORD"
    CLOUDFRONT_DOMAIN:     "/puppymap/prd/CLOUDFRONT_DOMAIN"

phases:
  build:
    commands:
      - echo "--- Gradle 빌드 ---"
      - chmod +x gradlew
      # clean으로 src/main/generated 초기화 → QueryDSL Q클래스 충돌 방지
      # test → asciidoctor(문서 생성) → bootJar(docs 포함) 순서로 실행
      - ./gradlew clean bootJar --no-daemon

artifacts:
  files:
    - build/libs/*.jar
    - appspec.yml
    - scripts/**/*
  discard-paths: no

cache:
  paths:
    - '/root/.gradle/caches/**/*'
    - '/root/.gradle/wrapper/**/*'
